<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        :root {
            --main: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        body {
            margin: 0;
            font-family: Arial;
            background: var(--light);
        }

        .container {
            display: flex;
        }

        .sidebar {
            width: 250px;
            background: var(--dark);
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: var(--main);
        }

        .main {
            flex: 1;
            padding: 20px;
            overflow: auto;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        button {
            background: var(--main);
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px;
        }

        input,
        textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="sidebar">
            <h2>Portfolio</h2>
            <a href="#" onclick="showPage('home')">Home</a>
            <a href="#" onclick="showPage('admin')">Admin</a>
        </div>

        <div class="main">
            <!-- HOME -->
            <div id="home">
                <h1>My Skills</h1>
                <div id="skills"></div>
            </div>

            <!-- ADMIN -->
            <div id="admin" style="display:none">
                <h1>Admin Panel</h1>

                <div class="card">
                    <h3>Add Skill</h3>
                    <input type="text" id="skillInput" placeholder="Skill name">
                    <button onclick="addSkill()">Add</button>
                </div>

                <div class="card">
                    <h3>Manage Skills</h3>
                    <div id="adminSkills"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let skills = JSON.parse(localStorage.getItem('skills')) || [];

        function save() {
            localStorage.setItem('skills', JSON.stringify(skills));
        }

        function render() {
            let skillsDiv = document.getElementById('skills');
            let adminDiv = document.getElementById('adminSkills');

            skillsDiv.innerHTML = '';
            adminDiv.innerHTML = '';

            skills.forEach((s, i) => {
                skillsDiv.innerHTML += `<div class="card">${s}</div>`;

                adminDiv.innerHTML += `
      <div class="card">
        ${s}
        <button onclick="deleteSkill(${i})">Delete</button>
      </div>`;
            });
        }

        function addSkill() {
            let input = document.getElementById('skillInput');
            if (input.value.trim() === '') return;

            skills.push(input.value);
            input.value = '';
            save();
            render();
        }

        function deleteSkill(i) {
            skills.splice(i, 1);
            save();
            render();
        }

        function showPage(page) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('admin').style.display = 'none';

            document.getElementById(page).style.display = 'block';
        }

        render();
    </script>

</body>

</html>
